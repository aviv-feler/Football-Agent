services:
  - type: web
    name: scoutai
    env: python
    # Runtime data artifacts are committed for deployment.
    # Raw source CSV files are intentionally excluded from the repository.
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FOOTBALL_DATA_API_KEY
        sync: false
