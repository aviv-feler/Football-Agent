services:
  - type: web
    name: scoutai
    env: python
    # Runtime data artifacts are already included in the repo, so data_prep.py
    # does not need to run during deployment.
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FOOTBALL_DATA_API_KEY
        sync: false
